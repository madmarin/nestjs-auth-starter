services:
  nestjs-auth-starter-db:
    container_name: nestjs-auth-starter-db
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - nestjs-auth-starter-postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    restart: always
    networks:
      - nestjs-auth-starter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      timeout: 20s
      retries: 10

  nestjs-auth-starter-api:
    container_name: nestjs-auth-starter-api
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      nestjs-auth-starter-db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${PORT}:4000"
    restart: always
    networks:
      - nestjs-auth-starter-network

  nestjs-auth-starter-redis:
    image: redis:7-alpine
    container_name: nestjs-auth-starter-redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - nestjs-auth-starter-redis-data:/data
    networks:
      - nestjs-auth-starter-network
    restart: always

networks:
  nestjs-auth-starter-network:
    driver: bridge

volumes:
  nestjs-auth-starter-postgres-data:
  nestjs-auth-starter-redis-data:
