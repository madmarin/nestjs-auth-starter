services:
  nestjs-auth-starter-db-dev:
    container_name: nestjs-auth-starter-db-dev
    image: postgres:16-alpine
    env_file:
      - .env.development
    volumes:
      - nestjs-auth-starter-postgres-data-dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - TZ=America/Lima
    ports:
      - "5434:5432"
    restart: always
    networks:
      - nestjs-auth-starter-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      timeout: 20s
      retries: 10

  nestjs-auth-starter-api-dev:
    container_name: nestjs-auth-starter-api-dev
    build:
      context: .
      dockerfile: Dockerfile.development
    command: pnpm start:dev
    depends_on:
      nestjs-auth-starter-db-dev:
        condition: service_healthy
    env_file:
      - .env.development
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./src:/usr/src/app/src
    restart: always
    networks:
      - nestjs-auth-starter-network-dev

  nestjs-auth-starter-redis-dev:
    image: redis:7-alpine
    container_name: nestjs-auth-starter-redis-dev
    env_file:
      - .env.development
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - nestjs-auth-starter-redis-data-dev:/data
    networks:
      - nestjs-auth-starter-network-dev
    restart: unless-stopped

networks:
  nestjs-auth-starter-network-dev:
    driver: bridge

volumes:
  nestjs-auth-starter-postgres-data-dev:
  nestjs-auth-starter-redis-data-dev:
